openapi: 3.0.0
info:
  title: Video Generator Microservice API
  description: API para generación de contenido multimedia (audio, imágenes y videos)
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Servidor de desarrollo

paths:
  /status:
    get:
      summary: Verificar estado del servicio
      description: Obtiene el estado básico del microservicio
      responses:
        '200':
          description: Estado del servicio
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: online
                  timestamp:
                    type: string
                    format: date-time
                  service:
                    type: string
                    example: video-generator
                  version:
                    type: string
                    example: 1.0.0

  /health:
    get:
      summary: Verificar salud del servicio
      description: |
        Verifica la salud del servicio. Por defecto realiza una verificación básica rápida.
        Para una verificación completa de todos los servicios dependientes, usar el parámetro ?check=full
      parameters:
        - name: check
          in: query
          description: Tipo de verificación (basic por defecto, full para verificación completa)
          required: false
          schema:
            type: string
            enum: [basic, full]
            default: basic
      responses:
        '200':
          description: Estado del servicio
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      status:
                        type: string
                        example: online
                      timestamp:
                        type: string
                        format: date-time
                      service:
                        type: string
                        example: video-generator
                      version:
                        type: string
                        example: 1.0.0
                      note:
                        type: string
                        example: For full health check, use ?check=full parameter
                  - type: object
                    properties:
                      status:
                        type: string
                        example: ok
                      services:
                        type: object
                        properties:
                          llm:
                            type: string
                            example: ok
                          tts:
                            type: string
                            example: fail
                          sora:
                            type: string
                            example: ok
                          blob:
                            type: string
                            example: ok
                          backend:
                            type: string
                            example: ok
                      timestamp:
                        type: string
                        format: date-time

  /audio/generate:
    post:
      summary: Generar audio
      description: Genera audio a partir de un prompt usando Azure TTS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  example: "Bienvenidos a nuestro canal de YouTube. Hoy vamos a hablar sobre..."
                voice:
                  type: string
                  example: "nova"
                plan:
                  type: string
                  enum: [FREE, CREATOR, PRO]
                  example: "CREATOR"
      responses:
        '200':
          description: Audio generado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: ✅ Audio generado y subido exitosamente
                  audioUrl:
                    type: string
                    example: https://storageaccount.blob.core.windows.net/audio/audio.mp3?sv=2020-08-04&ss=bfqt&srt=sco&sp=rwdlacupitfx&se=2025-10-16T00%3A00%3A00Z&st=2025-10-15T00%3A00%3A00Z&spr=https&sig=token
        '400':
          description: Solicitud inválida
        '500':
          description: Error interno del servidor

  /llm/generate-json:
    post:
      summary: Generar prompt JSON
      description: Genera un prompt JSON editable para video
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  example: "Un video sobre cómo preparar una hamburguesa gourmet"
                duration:
                  type: integer
                  example: 30
      responses:
        '200':
          description: Prompt JSON generado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: ✅ Prompt JSON generado correctamente
                  prompt:
                    type: object
                    example: {
                      "scene": "Cocina moderna",
                      "characters": ["Chef profesional"],
                      "camera": "Plano medio",
                      "lighting": "Iluminación cálida",
                      "style": "Estilo documental",
                      "interactionFocus": "Preparación de hamburguesa"
                    }
        '400':
          description: Solicitud inválida
        '500':
          description: Error interno del servidor

  /media/image:
    post:
      summary: Generar imagen promocional
      description: Genera imágenes promocionales (puede usar DALL·E o FLUX)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  example: "Un zapato deportivo flotando sobre un fondo futurista azul"
                plan:
                  type: string
                  enum: [FREE, CREATOR, PRO]
                  example: "CREATOR"
                useFlux:
                  type: boolean
                  example: true
      responses:
        '200':
          description: Imagen generada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: ✅ Imagen generada correctamente
                  result:
                    type: object
                    properties:
                      imageUrl:
                        type: string
                        example: https://storageaccount.blob.core.windows.net/images/image.png?sv=2020-08-04&ss=bfqt&srt=sco&sp=rwdlacupitfx&se=2025-10-16T00%3A00%3A00Z&st=2025-10-15T00%3A00%3A00Z&spr=https&sig=token
        '400':
          description: Solicitud inválida
        '500':
          description: Error interno del servidor

  /media/flux-image:
    post:
      summary: Generar imagen con FLUX-1.1-pro
      description: Genera imágenes usando FLUX-1.1-pro
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  example: "A majestic lion in the savannah at sunset"
                plan:
                  type: string
                  enum: [FREE, CREATOR, PRO]
                  example: "CREATOR"
                size:
                  type: string
                  enum: [1024x1024, 1024x768, 768x1024]
                  example: "1024x1024"
                isJsonPrompt:
                  type: boolean
                  example: false
      responses:
        '200':
          description: Imagen generada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: ✅ FLUX image generated successfully
                  data:
                    type: object
                    properties:
                      imageUrl:
                        type: string
                        example: https://storageaccount.blob.core.windows.net/images/image.png?sv=2020-08-04&ss=bfqt&srt=sco&sp=rwdlacupitfx&se=2025-10-16T00%3A00%3A00Z&st=2025-10-15T00%3A00%3A00Z&spr=https&sig=token
        '400':
          description: Solicitud inválida
        '500':
          description: Error interno del servidor

  /media/flux-kontext-image:
    post:
      summary: Generar imagen con FLUX.1-Kontext-pro
      description: Genera imágenes usando FLUX.1-Kontext-pro con opción de carga de imagen de referencia
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  example: "A beautiful landscape with mountains and lakes"
                plan:
                  type: string
                  enum: [FREE, CREATOR, PRO]
                  example: "CREATOR"
                size:
                  type: string
                  enum: [1024x1024, 1024x768, 768x1024]
                  example: "1024x1024"
                isJsonPrompt:
                  type: boolean
                  example: false
      responses:
        '200':
          description: Imagen generada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: ✅ FLUX.1-Kontext-pro image generated successfully
                  data:
                    type: object
                    properties:
                      imageUrl:
                        type: string
                        example: https://storageaccount.blob.core.windows.net/images/image.png?sv=2020-08-04&ss=bfqt&srt=sco&sp=rwdlacupitfx&se=2025-10-16T00%3A00%3A00Z&st=2025-10-15T00%3A00%3A00Z&spr=https&sig=token
        '400':
          description: Solicitud inválida
        '500':
          description: Error interno del servidor

  /videos/generate:
    post:
      summary: Generar video
      description: Genera videos completos con múltiples elementos (video, audio, subtítulos)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  example: "Un video sobre cómo preparar una hamburguesa gourmet"
                duration:
                  type: integer
                  example: 30
                options:
                  type: object
                  properties:
                    n_seconds:
                      type: integer
                      example: 30
                    height:
                      type: integer
                      example: 720
                    width:
                      type: integer
                      example: 1280
                    n_variants:
                      type: integer
                      example: 1
                useSora:
                  type: boolean
                  example: true
      responses:
        '200':
          description: Video generado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: ✅ Video generado y subido exitosamente con Sora
                  jobId:
                    type: string
                  blobUrl:
                    type: string
        '400':
          description: useSora debe ser true
        '500':
          description: Error interno del servidor

  /videos/health:
    get:
      summary: Verificar salud del servicio de video
      description: Verifica la salud del servicio Sora
      responses:
        '200':
          description: Estado del servicio
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  sora:
                    type: boolean
                  timestamp:
                    type: string
                    format: date-time

  /videos/generate-full:
    post:
      summary: Generar video completo
      description: Genera videos completos con múltiples elementos (video, audio, subtítulos)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  example: "Un video sobre cómo preparar una hamburguesa gourmet"
                duration:
                  type: integer
                  example: 30
                options:
                  type: object
                  properties:
                    n_seconds:
                      type: integer
                      example: 30
                    height:
                      type: integer
                      example: 720
                    width:
                      type: integer
                      example: 1280
                    n_variants:
                      type: integer
                      example: 1
                useSora:
                  type: boolean
                  example: true
      responses:
        '200':
          description: Video generado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: ✅ Video generado y subido exitosamente con Sora
                  jobId:
                    type: string
                  blobUrl:
                    type: string
        '400':
          description: useSora debe ser true
        '500':
          description: Error interno del servidor